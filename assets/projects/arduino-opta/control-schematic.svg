<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="t d"><title id="t">Arduino Opta PLC and LabVIEW control schematic</title><desc id="d">LabVIEW communicates through TCP and UDP with an Arduino Opta PLC controlling field inputs and outputs.</desc><defs><style>.b{fill:#fff;stroke:#15231e;stroke-width:3}.c{fill:#eef8d8;stroke:#638c14;stroke-width:3}.w{fill:none;stroke:#188447;stroke-width:5}.p{fill:none;stroke:#2166c2;stroke-width:4}.h{font:700 27px Arial;fill:#101a17}.s{font:18px Consolas,monospace;fill:#42524c}</style></defs><rect width="1200" height="700" fill="#f8f7f2"/><text x="60" y="65" class="h">ARDUINO OPTA + LABVIEW · CONTROL SCHEMATIC</text><rect x="65" y="225" width="260" height="220" rx="15" class="b"/><text x="110" y="285" class="h">LabVIEW VI</text><text x="108" y="325" class="s">operator controls</text><text x="95" y="355" class="s">status + acquisition</text><text x="120" y="385" class="s">TCP / UDP API</text><rect x="455" y="200" width="290" height="270" rx="18" class="c"/><text x="510" y="265" class="h">Arduino Opta</text><text x="505" y="305" class="s">IEC 61131-3 logic</text><text x="510" y="337" class="s">structured text</text><text x="520" y="369" class="s">ladder logic</text><text x="515" y="401" class="s">network service</text><rect x="875" y="120" width="250" height="135" rx="15" class="b"/><text x="931" y="180" class="h">Inputs</text><text x="915" y="215" class="s">sensors / switches</text><rect x="875" y="430" width="250" height="135" rx="15" class="b"/><text x="925" y="490" class="h">Outputs</text><text x="905" y="525" class="s">relays / peripherals</text><path d="M325 335H455M745 285H815V187H875M745 395H815V497H875" class="w"/><path d="M455 385H365V285H455" class="p"/></svg>
