<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="t d"><title id="t">Point to point LoRa node radio schematic</title><desc id="d">ATmega328P exchanges packets over SPI with an SX1278 LoRa transceiver connected to an SMA antenna.</desc><defs><style>.b{fill:#fff;stroke:#15231e;stroke-width:3}.c{fill:#eef8d8;stroke:#638c14;stroke-width:3}.w{fill:none;stroke:#188447;stroke-width:5}.p{fill:none;stroke:#2166c2;stroke-width:4}.h{font:700 27px Arial;fill:#101a17}.s{font:18px Consolas,monospace;fill:#42524c}</style></defs><rect width="1200" height="700" fill="#f8f7f2"/><text x="60" y="65" class="h">P2P LoRa NODE · RADIO INTERFACE SCHEMATIC</text><rect x="60" y="245" width="235" height="170" rx="15" class="b"/><text x="103" y="305" class="h">Data input</text><text x="94" y="340" class="s">QR / host payload</text><text x="110" y="372" class="s">UART interface</text><rect x="380" y="220" width="270" height="220" rx="18" class="c"/><text x="420" y="280" class="h">ATmega328P</text><text x="435" y="320" class="s">packet framing</text><text x="425" y="350" class="s">sequence + retry</text><rect x="745" y="220" width="250" height="220" rx="15" class="b"/><text x="805" y="280" class="h">SX1278</text><text x="792" y="320" class="s">LoRa transceiver</text><text x="815" y="350" class="s">SPI + IRQ</text><rect x="1045" y="270" width="110" height="120" rx="14" class="b"/><text x="1073" y="322" class="h">SMA</text><text x="1062" y="354" class="s">antenna</text><rect x="380" y="520" width="270" height="105" rx="14" class="b"/><text x="420" y="565" class="h">Li-ion power</text><text x="429" y="595" class="s">regulated rail</text><path d="M295 330H380M650 330H745M995 330H1045" class="w"/><path d="M515 520V440M650 572H700V395H745" class="p"/><text x="666" y="312" class="s">SPI</text></svg>
