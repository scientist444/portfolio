<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="t d"><title id="t">Line following robot controller schematic</title><desc id="d">Five infrared sensors feed an STM32 controller which drives two motors through a dual motor driver.</desc><defs><style>.b{fill:#fff;stroke:#15231e;stroke-width:3}.c{fill:#eef8d8;stroke:#638c14;stroke-width:3}.w{fill:none;stroke:#188447;stroke-width:5}.p{fill:none;stroke:#2166c2;stroke-width:4}.h{font:700 27px Arial;fill:#101a17}.s{font:18px Consolas,monospace;fill:#42524c}</style></defs><rect width="1200" height="700" fill="#f8f7f2"/><text x="60" y="65" class="h">LINE-FOLLOWING ROBOT · CONTROLLER SCHEMATIC</text><rect x="55" y="235" width="250" height="190" rx="15" class="b"/><text x="101" y="295" class="h">5 × TCRT5000</text><text x="105" y="332" class="s">line sensor array</text><text x="98" y="365" class="s">five ADC channels</text><rect x="405" y="220" width="270" height="220" rx="18" class="c"/><text x="452" y="280" class="h">STM32F103</text><text x="452" y="320" class="s">sensor sampling</text><text x="470" y="350" class="s">control loop</text><text x="468" y="380" class="s">PWM outputs</text><rect x="785" y="220" width="270" height="220" rx="15" class="b"/><text x="826" y="280" class="h">TB6612FNG</text><text x="835" y="320" class="s">dual H-bridge</text><text x="834" y="350" class="s">PWM + direction</text><rect x="930" y="505" width="210" height="105" rx="14" class="b"/><text x="972" y="550" class="h">Motors A/B</text><text x="979" y="580" class="s">differential drive</text><rect x="405" y="520" width="270" height="105" rx="14" class="b"/><text x="456" y="565" class="h">Li-Po + buck</text><text x="467" y="595" class="s">logic / motor rails</text><path d="M305 330H405M675 330H785M920 440V505H930" class="w"/><path d="M540 520V440M675 572H840V410H785" class="p"/></svg>
